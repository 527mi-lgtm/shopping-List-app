<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 28px 28px 24px;
      color: #fff;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header .stats {
      margin-top: 6px;
      font-size: 0.88rem;
      opacity: 0.85;
    }

    .input-area {
      padding: 20px 20px 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #667eea;
    }

    .input-area button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .input-area button:hover { opacity: 0.9; }
    .input-area button:active { transform: scale(0.96); }

    .filters {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filters button {
      padding: 6px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      background: none;
      font-size: 0.82rem;
      color: #64748b;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #667eea;
      border-color: #667eea;
      color: #fff;
    }

    .list {
      padding: 12px 20px;
      min-height: 120px;
      max-height: 420px;
      overflow-y: auto;
    }

    .empty {
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      padding: 40px 0;
    }

    .empty span { display: block; font-size: 2.4rem; margin-bottom: 10px; }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 12px;
      margin-bottom: 8px;
      background: #f8fafc;
      transition: background 0.2s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item.checked {
      opacity: 0.55;
      background: #f1f5f9;
    }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.97rem;
      color: #1e293b;
      word-break: break-all;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e1;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #ef4444;
      background: #fee2e2;
    }

    .footer {
      padding: 14px 20px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer span {
      font-size: 0.82rem;
      color: #94a3b8;
    }

    .clear-btn {
      font-size: 0.82rem;
      color: #ef4444;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .clear-btn:hover { background: #fee2e2; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>🛒 쇼핑 리스트</h1>
      <div class="stats" id="stats">0개 항목</div>
    </div>

    <div class="input-area">
      <input type="text" id="input" placeholder="아이템을 입력하세요..." maxlength="60" />
      <button onclick="addItem()">+</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">전체</button>
      <button onclick="setFilter('active', this)">미완료</button>
      <button onclick="setFilter('done', this)">완료</button>
    </div>

    <div class="list" id="list"></div>

    <div class="footer">
      <span id="footer-info"></span>
      <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const filtered = items.filter(i =>
        filter === 'all'    ? true :
        filter === 'active' ? !i.checked :
                               i.checked
      );

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty"><span>${filter === 'done' ? '✅' : '🛍️'}</span>${
          filter === 'done' ? '완료된 항목이 없어요' : '아이템을 추가해보세요!'
        }</div>`;
      } else {
        list.innerHTML = filtered.map(item => `
          <div class="item ${item.checked ? 'checked' : ''}" id="item-${item.id}">
            <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggle(${item.id})" />
            <span class="item-text">${escHtml(item.text)}</span>
            <button class="delete-btn" onclick="deleteItem(${item.id})" title="삭제">✕</button>
          </div>
        `).join('');
      }

      const total   = items.length;
      const done    = items.filter(i => i.checked).length;
      const active  = total - done;

      document.getElementById('stats').textContent =
        total === 0 ? '0개 항목' : `총 ${total}개 · 완료 ${done}개`;
      document.getElementById('footer-info').textContent =
        `미완료 ${active}개`;
    }

    function addItem() {
      const input = document.getElementById('input');
      const text  = input.value.trim();
      if (!text) return;
      items.unshift({ id: Date.now(), text, checked: false });
      input.value = '';
      save(); render();
    }

    function toggle(id) {
      const item = items.find(i => i.id === id);
      if (item) { item.checked = !item.checked; save(); render(); }
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      save(); render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save(); render();
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
